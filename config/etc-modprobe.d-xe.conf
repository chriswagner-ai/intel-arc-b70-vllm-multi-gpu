# /etc/modprobe.d/xe.conf
#
# Force the in-kernel `xe` driver to claim Intel Arc Pro B70 (BMG-G31, 8086:e223).
# Device id e223 is too new for the xe driver's default probe list, so without
# force_probe the kernel binds nothing (or falls back to i915, which does not
# support Battlemage compute). This is the single load-bearing driver-side option.
#
# After editing, rebuild the initramfs (so xe loads early) and reboot:
#   sudo mkinitcpio -P && sudo reboot
# Verify:  lspci -nnk -d 8086:e223   # each card -> "Kernel driver in use: xe"

options xe force_probe=e223
options i915 enable_guc=3
